{% extends "core/base.html" %}

{% block title %}{{ app_name }}{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-50">
  <div class="max-w-4xl mx-auto px-6 py-10">
    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
      <p class="text-sm font-medium text-blue-600 uppercase tracking-wide">
        REST API
      </p>

      <h1 class="mt-2 text-3xl font-bold text-gray-900">
        {{ app_name }}
      </h1>

      <p class="mt-3 text-gray-600">
        API documentation and schema endpoints.
      </p>

      <div class="mt-8 space-y-4">
        {% for label, url in api_links.items %}
          <a
            href="{{ url }}"
            class="block rounded-xl border border-gray-200 bg-gray-50 px-5 py-4 hover:bg-gray-100 transition"
          >
            <div class="text-base font-semibold text-gray-900">{{ label }}</div>
            <div class="text-sm text-gray-600 mt-1">{{ url }}</div>
          </a>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
