{% if messages %}
  <div class="fixed top-6 right-6 z-50 space-y-3 w-full max-w-sm">
    {% for message in messages %}
      <div class="toast-item transform transition-all duration-500 ease-in-out flex items-center gap-3 px-6 py-4 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border 
                  {% if message.tags == 'error' %}
                    bg-red-50 border-red-200 text-red-700
                  {% elif message.tags == 'warning' %}
                    bg-amber-50 border-amber-200 text-amber-700
                  {% else %}
                    bg-green-50 border-green-200 text-green-700
                  {% endif %}">
        
        <div class="w-6 h-6 shrink-0 rounded-full flex items-center justify-center text-white
                    {% if message.tags == 'error' %} bg-red-600 {% elif message.tags == 'warning' %} bg-amber-500 {% else %} bg-green-600 {% endif %}">
          {% if message.tags == 'error' %}
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
          {% elif message.tags == 'warning' %}
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
          {% else %}
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
          {% endif %}
        </div>

        <span class="text-sm font-semibold">{{ message }}</span>
      </div>
    {% endfor %}
  </div>

  <script>
    // Find all toasts and remove them one by one
    document.querySelectorAll('.toast-item').forEach((toast, index) => {
      setTimeout(() => {
        // Start fading out
        toast.style.opacity = "0";
        toast.style.transform = "translateX(20px)";
        
        // Remove from DOM after fade finishes
        setTimeout(() => toast.remove(), 500);
      }, 3000 + (index * 200)); // Stagger the disappearance
    });
  </script>
{% endif %}
