<div id="editCourseModal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm"
     onclick="closeEditCourseModal()">

  <div class="w-[92%] max-w-3xl" onclick="event.stopPropagation()">
    <div class="bg-white rounded-3xl shadow-[0_30px_90px_rgba(0,0,0,0.25)] overflow-hidden border border-slate-100 max-h-[90vh] flex flex-col">

      <div class="px-6 py-5 flex items-start justify-between border-b border-slate-100">
        <div class="flex items-start gap-4">
          <div class="h-12 w-12 rounded-2xl bg-amber-50 flex items-center justify-center text-amber-600 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>

          <div>
            <div class="text-2xl font-extrabold text-slate-900 leading-tight">Edit Course</div>
            <div class="text-sm text-slate-500">Update course details. Changes apply to all enrolled students.</div>
          </div>
        </div>

        <button type="button" onclick="closeEditCourseModal()"
                class="p-2 rounded-xl hover:bg-slate-100 text-slate-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>

      <form id="editCourseModalForm" method="post" action="" class="px-6 py-5 space-y-5 overflow-y-auto">
        {% csrf_token %}

        <input type="hidden" name="next" value="{{ request.get_full_path }}">

        <div>
          <label class="block text-sm font-semibold text-slate-800 mb-2">
            Course ID
          </label>
          <input type="text" name="course_id" id="edit_course_id" readonly
                 class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-slate-500 bg-slate-50 cursor-not-allowed focus:outline-none">
          <p class="mt-1 text-xs text-slate-500">Course ID cannot be changed after creation.</p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-800 mb-2">
            Course Title <span class="text-red-500">*</span>
          </label>
          <input type="text" name="title" id="edit_title" required
                 class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-200">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-800 mb-2">
            Course Description <span class="text-red-500">*</span>
          </label>
          <textarea name="description" id="edit_description" rows="5" required
                    class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-200"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-800 mb-2">
            Category <span class="text-red-500">*</span>
          </label>
          <select name="category" id="edit_category" required
                  class="w-full rounded-2xl border border-slate-200 px-4 py-3 bg-white text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-200">
            {% for v, lbl in category_choices %}
              <option value="{{ v }}">{{ lbl }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-800 mb-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
              </svg>
              Duration
            </label>
            <input type="text" name="duration" id="edit_duration"
                   placeholder="e.g., 12 weeks"
                   class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-200">
          </div>

          <div>
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-800 mb-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              Max Students
            </label>
            <input type="number" name="max_students" id="edit_max_students"
                   placeholder="e.g., 50" min="1"
                   class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-200">
            <div class="mt-1 text-xs text-slate-500">Leave blank for unlimited.</div>
          </div>
        </div>

        <div class="h-2"></div>
      </form>

      <div class="px-6 py-5 border-t border-slate-100 bg-white">
        <div class="grid grid-cols-2 gap-4">
          <button type="button" onclick="closeEditCourseModal()"
                  class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 font-semibold text-slate-700 hover:bg-slate-50">
            Cancel
          </button>
          <button type="submit" form="editCourseModalForm"
                  class="w-full rounded-2xl bg-blue-600 px-4 py-3.5 font-semibold text-white hover:bg-blue-700 shadow-[0_12px_30px_rgba(37,99,235,0.25)]">
            Save Changes
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  function openEditCourseModal(btn) {
    const modal = document.getElementById("editCourseModal");
    const form = document.getElementById("editCourseModalForm");
    if (!modal || !form) return;

    // 1. Inject the specific URL for this course
    form.action = btn.dataset.editUrl;

    // 2. Populate the form fields using the data attributes from the button
    document.getElementById("edit_course_id").value = btn.dataset.courseCode || "";
    document.getElementById("edit_title").value = btn.dataset.title || "";
    document.getElementById("edit_description").value = btn.dataset.description || "";
    document.getElementById("edit_category").value = btn.dataset.category || "";
    document.getElementById("edit_duration").value = btn.dataset.duration || "";
    document.getElementById("edit_max_students").value = btn.dataset.maxStudents || "";

    // 3. Show the modal
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    document.addEventListener("keydown", escCloseEditCourseModal);
  }

  function closeEditCourseModal() {
    const modal = document.getElementById("editCourseModal");
    if (!modal) return;
    modal.classList.add("hidden");
    modal.classList.remove("flex");
    document.removeEventListener("keydown", escCloseEditCourseModal);
  }

  function escCloseEditCourseModal(e) {
    if (e.key === "Escape") closeEditCourseModal();
  }
</script>
