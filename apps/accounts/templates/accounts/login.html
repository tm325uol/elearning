{% extends "core/layout.html" %}
{% block title %}Login - eLearning{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50/50">
    
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/20 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Welcome back</h2>
        <p class="mt-2 text-sm text-gray-600">
            Please enter your credentials to sign in
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 sm:rounded-2xl sm:px-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100">
            
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                    <div class="mt-1.5">
                        <input id="username" name="username" type="text" autocomplete="username" required class="block w-full appearance-none rounded-xl border border-gray-200 px-4 py-2.5 placeholder-gray-400 focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600 sm:text-sm transition-colors" placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                                Forgot password?
                            </a>
                        </div>
                    </div>
                    <div class="mt-1.5">
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full appearance-none rounded-xl border border-gray-200 px-4 py-2.5 placeholder-gray-400 focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600 sm:text-sm transition-colors" placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-xl shadow-[0_8px_20px_rgba(37,99,235,0.15)] text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 transition-all active:scale-[0.98]">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-600">
                    Don't have an account yet? 
                    <a href="/signup/" class="font-semibold text-blue-600 hover:text-blue-500 transition-colors">
                        Sign up for free
                    </a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
