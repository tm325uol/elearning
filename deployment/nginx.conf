#/etc/nginx/sites-available/elearning
server {
    listen 80;
    server_name 165.232.47.173;

    location = /favicon.ico { access_log off; log_not_found off; }

    # Serve static files directly via Nginx
    location /static/ {
        alias /opt/webdev-final/elearning/staticfiles/;
    }

    # WebSocket handling for Channels
    location /ws/ {
    	proxy_pass http://127.0.0.1:8001;
    	proxy_http_version 1.1;
    	proxy_set_header Upgrade $http_upgrade;
    	proxy_set_header Connection "upgrade";
    	proxy_set_header Host $host;
    	proxy_cache_bypass $http_upgrade;
    }

    # Pass all other requests to Gunicorn
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }
}
